<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notes MarkDown</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1>Notes MarkDown</h1>
    <p>App para gestionar notas en formato markdown</p>

    <h2>Editor de Nota</h2>
    <textarea id="noteEditor" rows="6" cols="50"></textarea>

    <h2>Preview Markdown</h2>
    <div id="markdownPreview" style="border: 1px solid #ccc; padding: 10px;"></div>

    <button id="loadNoteBtn">Cargar Nota de Prueba</button>
    <button id="saveNoteBtn">Guardar Nota</button>

    <script src="app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</body>
</html>
